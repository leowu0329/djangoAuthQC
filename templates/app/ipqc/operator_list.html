{% extends 'base.html' %}

{% block title %}作業人員{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="card shadow-sm w-100">
        <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0"><i class="fas fa-user-cog me-2"></i>作業人員清單</h3>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light en-font">
                        <tr>
                            <th style="width: 100px;">ID</th>
                            <th>姓名</th>
                            <th>部門</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in items %}
                        <tr>
                            <td class="en-font">{{ item.id }}</td>
                            <td>{{ item.name|default:"-" }}</td>
                            <td>{{ item.department|default:"-" }}</td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3" class="text-center text-muted py-4">目前無資料</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
